name: Deploy Frontend Production

# trigger workflow
on:
  # khi push code lên branch main
  push:
    branches: ["main"]

# các job sẽ chạy
jobs:
  # =========================
  # BUILD + PUSH DOCKER IMAGE
  # =========================
  build-and-push:
    # máy ảo GitHub Actions
    runs-on: ubuntu-latest

    # environment GitHub
    environment: vps-hange

    steps:
      # clone source code repo về runner
      - name: Checkout source code
        uses: actions/checkout@v4

      # login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # tạo file .env production để build Next.js
      - name: Create .env file
        run: echo "${{ secrets.ENV_PRODUCTION }}" > .env

      # build docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hange-frontend:latest .

      # push image lên Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hange-frontend:latest

  # =========================
  # DEPLOY VPS
  # =========================
  deploy:
    # chạy sau khi build xong
    needs: build-and-push

    runs-on: ubuntu-latest

    environment: vps-hange

    steps:
      # SSH vào VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          # thông tin VPS
          host: ${{ secrets.HOST_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          password: ${{ secrets.PASSWORD_PRODUCTION }}
          port: ${{ secrets.PORT_PRODUCTION }}

          # script chạy trong VPS
          script: |

            # đi tới folder production
            cd ~/.pro-images

            # pull image mới từ Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/hange-frontend:latest

            # restart frontend container
            docker-compose up -d frontend
